<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Infinite.win — Stats</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:radial-gradient(ellipse at top,#1a0d1d 0%,#0d1117 60%);color:#e6edf3;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{width:100%;max-width:640px;background:#161b22;border:1px solid #30363d;border-radius:16px;padding:36px;box-shadow:0 30px 80px rgba(255,59,59,.08),0 10px 40px rgba(0,0,0,.6)}
  .header{display:flex;align-items:center;gap:20px;margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid #30363d}
  .header img{width:84px;height:84px;border-radius:50%;border:3px solid #ff3b3b;box-shadow:0 0 24px rgba(255,59,59,.3)}
  .name{font-size:26px;font-weight:700;margin-bottom:4px}
  .name a{color:#58a6ff;text-decoration:none}
  .name a:hover{text-decoration:underline}
  .username{color:#8b949e;font-size:14px}
  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .stat{background:#0d1117;border:1px solid #30363d;border-radius:10px;padding:18px;transition:border-color .2s}
  .stat:hover{border-color:#ff3b3b}
  .label{color:#8b949e;font-size:11px;text-transform:uppercase;letter-spacing:.8px;font-weight:600}
  .value{font-size:24px;font-weight:700;margin-top:8px;word-break:break-word}
  .footer{margin-top:28px;text-align:center;color:#8b949e;font-size:12px}
  .brand{color:#ff3b3b;font-weight:700}
  .updated{margin-top:6px;font-size:11px;opacity:.6}
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <img id="headshot" alt="avatar">
      <div>
        <div class="name"><a id="profileLink" target="_blank" rel="noopener"><span id="display">Player</span></a></div>
        <div class="username">@<span id="username">unknown</span></div>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="label">🎲 Rolls</div><div class="value" id="rolls">—</div></div>
      <div class="stat"><div class="label">💰 Coins</div><div class="value" id="coins">—</div></div>
      <div class="stat"><div class="label">📍 Zone</div><div class="value" id="zone">—</div></div>
      <div class="stat"><div class="label">⚡ Roll Speed</div><div class="value" id="speed">—</div></div>
      <div class="stat"><div class="label">👥 Server</div><div class="value" id="server">—</div></div>
      <div class="stat"><div class="label">🎮 Game</div><div class="value" id="game">—</div></div>
    </div>
    <div class="footer">Powered by <span class="brand">Infinite.win</span><div class="updated" id="updated"></div></div>
  </div>
<script>
  const p = new URLSearchParams(location.search);
  const set = (id, key) => { const v = p.get(key); if (v) document.getElementById(id).textContent = v; };
  ['display','username','rolls','coins','zone','speed','server','game'].forEach(k => set(k, k === 'username' ? 'user' : k));
  const head = p.get('headshot'); if (head) document.getElementById('headshot').src = head;
  const uid = p.get('userid'); if (uid) document.getElementById('profileLink').href = 'https://www.roblox.com/users/' + uid + '/profile';
  document.title = (p.get('display') || 'Player') + ' — Infinite.win';
  document.getElementById('updated').textContent = 'Snapshot at ' + new Date().toLocaleTimeString();
</script>
</body>
</html>
